<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="18" fill="#111118"/>

  <!-- Letter D — large, anchored bottom-left -->
  <text x="8" y="87"
        font-family="'Arial Black', Arial, 'Helvetica Neue', sans-serif"
        font-size="84"
        font-weight="900"
        fill="#a5b4fc">D</text>

  <!-- Paper sheet — tilted 7° CW, sitting in the upper-right, partially obscuring D -->
  <g transform="rotate(7, 64, 41)">
    <rect x="40" y="9" width="48" height="64"
          rx="5"
          fill="#1c1c27"
          stroke="#3a3a4e"
          stroke-width="2"/>
    <!-- Writing lines -->
    <line x1="49" y1="24" x2="80" y2="24" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="49" y1="34" x2="80" y2="34" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="49" y1="44" x2="80" y2="44" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="49" y1="54" x2="80" y2="54" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="49" y1="64" x2="68" y2="64" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>
